asyncapi: 3.0.0
info:
  title: AAS Submodel ASYNC API with CloudEvents
  version: 0.3-SNAPSHOT
channels:
  submodel/updated:
    address: noauth or all or participantid
    messages:
      publish.message:
        $ref: '#/components/messages/updated'
    parameters:
      submodelid:
        $ref: '#/components/parameters/submodelid'
  submodel/created:
    address: noauth or all or participantid
    messages:
      publish.message:
        $ref: '#/components/messages/created'
    parameters:
      submodelid:
        $ref: '#/components/parameters/submodelid'
  submodel/deleted:
    address: noauth or all or participantid
    messages:
      publish.message:
        $ref: '#/components/messages/deleted'
    parameters:
      submodelid:
        $ref: '#/components/parameters/submodelid'
operations:
  submodel/updated.publish:
    action: send
    channel:
      $ref: '#/channels/submodel~1updated'
    messages:
      - $ref: '#/channels/submodel~1updated/messages/publish.message'
  submodel/created.publish:
    action: send
    channel:
      $ref: '#/channels/submodel~1created'
    messages:
      - $ref: '#/channels/submodel~1created/messages/publish.message'
  submodel/deleted.publish:
    action: send
    channel:
      $ref: '#/channels/submodel~1deleted'
    messages:
      - $ref: '#/channels/submodel~1deleted/messages/publish.message'
components:
  messages:
    updated:
      name: SubmodelUpdated
      title: Submodel Update message
      summary: Emitted when the metadata of a submodel is updated
      payload:
        $ref: '#/components/schemas/updatedEvent'
      examples:
        - name: Submodel updated
          payload:
            specversion: '1.0'
            id: 358c02f2-3a11-4836-971b-43a05550bf97
            source: 'https://providercorp.com/submodels/aHR0cHM6Ly9leGFtcGxlLmNvbS9zdWJtb2RlbHMvbmFtZXBsYXRlLTAwMQ=='
            type: io.admin-shell.events.v1.updated
            datacontenttype: application/json
            dataschema: 'https://api.swaggerhub.com/domains/Plattform_i40/Part1-MetaModel-Schemas/V3.1.0#/components/schemas/Submodel'
            time: '2024-11-26T10:46:33.2171298+01:00'
            semanticid: '0173-1#02-AAA119#002'
            data:
              id: 'https://example.com/submodels/nameplate-001'
              modelType: Submodel
              idShort: Nameplate
              kind: Instance
              semanticId:
                type: ExternalReference
                keys:
                  - type: GlobalReference
                    value: '0173-1#01-AAA111#002'
              submodelElements:
                - idShort: ManufacturerName
                  modelType: Property
                  valueType: xs:string
                  value: Example Corp GmbH
                - idShort: SerialNumber
                  modelType: Property
                  valueType: xs:string
                  value: SN-20241126-001
    created:
      name: SubmodelCreated
      title: Submodel Create message
      summary: Emitted when a submodel is created
      payload:
        $ref: '#/components/schemas/createdEvent'
      examples:
        - name: Submodel created
          payload:
            specversion: '1.0'
            id: ecbd132e-d834-4528-bb30-6790104ca474
            source: 'https://providercorp.com/submodels/aHR0cHM6Ly9leGFtcGxlLmNvbS9zdWJtb2RlbHMvdGVjaC1kYXRhLTAwMQ=='
            type: io.admin-shell.events.v1.created
            datacontenttype: application/json
            dataschema: 'https://api.swaggerhub.com/domains/Plattform_i40/Part1-MetaModel-Schemas/V3.1.0#/components/schemas/Submodel'
            time: '2024-11-26T10:44:11.9367113+01:00'
            semanticid: '0173-1#02-AAA120#003'
            data:
              id: 'https://example.com/submodels/tech-data-001'
              modelType: Submodel
              idShort: TechnicalData
              kind: Instance
              semanticId:
                type: ExternalReference
                keys:
                  - type: GlobalReference
                    value: '0173-1#01-AFZ615#016'
              submodelElements:
                - idShort: MaxRotationSpeed
                  modelType: Property
                  valueType: xs:int
                  value: '5000'
                  semanticId:
                    type: ExternalReference
                    keys:
                      - type: GlobalReference
                        value: '0173-1#02-ABH978#001'
    deleted:
      name: SubmodelDeleted
      title: Submodel Delete message
      summary: Emitted when a submodel is deleted
      payload:
        $ref: '#/components/schemas/deletedEvent'
      examples:
        - name: Submodel deleted
          payload:
            specversion: '1.0'
            id: 7f3c1a2b-9e44-4c31-bc01-2890abc45678
            source: 'https://providercorp.com/submodels/aHR0cHM6Ly9leGFtcGxlLmNvbS9zdWJtb2RlbHMvb2Jzb2xldGUtMDIz'
            type: io.admin-shell.events.v1.deleted
            datacontenttype: application/json
            time: '2024-11-26T11:02:50.1234567+01:00'
            semanticid: '0173-1#02-AAA119#002'
  parameters:
    submodelid:
      description: The Id of the submodel in the Asset Administration Shell with aasId.
  schemas:
    base:
      properties:
        specversion:
          description: The version of the CloudEvents specification which the event uses.
          type: string
          const: '1.0'
        id:
          description: Identifies the event.
          type: string
          examples:
            - 358c02f2-3a11-4836-971b-43a05550bf97
        source:
          description: The URL the emitting Referable can be obtained from. The element must be of the type indicated in the `dataschema` property.
          type: string
          pattern: ^https?:\/\/[^\s/$.?#].[^\s]*$
          examples:
            - 'https://providercorp.com/submodels/abcdef'
        datacontenttype:
          description: Content type of the event data.
          type: string
          const: application/json
        dataschema:
          description: Identifies the schema that the event data adheres to.
          type: string
          format: uri
          enum:
            - >-
              https://api.swaggerhub.com/domains/Plattform_i40/Part1-MetaModel-Schemas/V3.1.0#/components/schemas/Submodel
        time:
          description: Timestamp of when the occurrence happened.
          format: date-time
          type: string
          examples:
            - '2024-11-26T10:46:33.2171298+01:00'
        semanticid:
          description: If the Submodel pointed to in `source` inherits from `HasSemantics` and has `semanticId` set, this property MAY hold the value of the `value` property of the `Key` object at index 0 of the `keys`-array.
          type: string
          examples:
            - "0173-1#02-AAA119#002"
        data:
          $ref: https://raw.githubusercontent.com/admin-shell-io/aas-specs-metamodel/refs/heads/master/schemas/json/aas.json#/definitions/Submodel

    updatedEvent:
      properties:
        specversion:
          $ref: '#/components/schemas/base/properties/specversion'
        id:
          $ref: '#/components/schemas/base/properties/id'
        source:
          $ref: '#/components/schemas/base/properties/source'
        type:
          description: Describes the type of the event related to the source the event originated in.
          const: io.admin-shell.events.v1.updated
        datacontenttype:
          $ref: '#/components/schemas/base/properties/datacontenttype'
        dataschema:
          $ref: '#/components/schemas/base/properties/dataschema'
        time:
          $ref: '#/components/schemas/base/properties/time'
        semanticid:
          $ref: '#/components/schemas/base/properties/semanticid'
        data:
          $ref: '#/components/schemas/base/properties/data'
      required:
        - specversion
        - id
        - source
        - type
        - datacontenttype
        - dataschema
        - time
      optional:
        - data
        - semanticid
    createdEvent:
      properties:
        specversion:
          $ref: '#/components/schemas/base/properties/specversion'
        id:
          $ref: '#/components/schemas/base/properties/id'
        source:
          $ref: '#/components/schemas/base/properties/source'
        type:
          description: Describes the type of the event related to the source the event originated in.
          const: io.admin-shell.events.v1.created
        datacontenttype:
          $ref: '#/components/schemas/base/properties/datacontenttype'
        dataschema:
          $ref: '#/components/schemas/base/properties/dataschema'
        time:
          $ref: '#/components/schemas/base/properties/time'
        semanticid:
          $ref: '#/components/schemas/base/properties/semanticid'
        data:
          $ref: '#/components/schemas/base/properties/data'
      required:
        - specversion
        - id
        - source
        - type
        - datacontenttype
        - dataschema
        - time
      optional:
        - data
        - semanticid
    deletedEvent:
      properties:
        specversion:
          $ref: '#/components/schemas/base/properties/specversion'
        id:
          $ref: '#/components/schemas/base/properties/id'
        source:
          description: The URL pointing to where the emitting Submodel **was contained**.
          type: string
          pattern: ^https?:\/\/[^\s/$.?#].[^\s]*$
          examples:
            - 'https://providercorp.com/submodels/abcdef'
        type:
          description: Describes the type of the event related to the source the event originated in.
          const: io.admin-shell.events.v1.deleted
        dataschema:
          $ref: '#/components/schemas/base/properties/dataschema'
        time:
          $ref: '#/components/schemas/base/properties/time'
        semanticid:
          description: If the Submodel pointed to in `source` inherited from `HasSemantics` and has `semanticId` set, this property MAY hold the value of the `value` property of the `Key` object at index 0 of the `keys`-array.
          type: string
          examples:
            - "0173-1#02-AAA119#002"
      required:
        - specversion
        - id
        - source
        - type
        - time
      optional:
        - semanticid